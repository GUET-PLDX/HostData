global_settings:
  monitor_sleep_ms: 1000
modules:
- id: blink_led
  name: BlinkLED
  constructor_args:
    blink_cycle: 250
- id: buzzer
  name: BuzzerAlarm
  constructor_args:
    alarm_freq: 1500
    alarm_duration: 300
    alarm_delay: 300
- id: ref
  name: Referee
  constructor_args:
    task_stack_depth_uart: 1536
    uart: uart_referee
    baudrate: 115200
    referee_chassis_tp_name: chassis_ref
    referee_launcher_tp_name: launcher_ref
    referee_robot_game_tp_name: sentry_ref
    referee_radar_tp_name: radar_ref
    thread_priority_uart: LibXR::Thread::Priority::MEDIUM
- id: SentryProtocol_0
